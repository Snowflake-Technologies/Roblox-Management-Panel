name: Lint

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Lint Frontend
        run: |
          cd apps/web
          npm install
          npm run lint

      - name: Lint API
        run: |
          cd apps/api
          npm install
          npm run lint
