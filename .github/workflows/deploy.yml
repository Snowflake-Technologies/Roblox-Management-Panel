name: Deploy

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Build Project
        run: |
          cd apps/web
          npm install
          npm run build

          cd ../api
          npm install
          npm run build

      - name: Deployment Placeholder
        run: |
          echo "Configure Railway, Render, Docker, or VPS deployment here."
